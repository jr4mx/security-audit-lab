sonar.projectKey=secure-audit-lab
sonar.projectName=Secure Audit Lab
sonar.projectVersion=1.0.0

# Organización de SonarCloud
sonar.organization=jr4mx

# ========================================
# FUENTES DE CÓDIGO
# ========================================
# Directorios de código fuente (todo el proyecto)
sonar.sources=.
sonar.inclusions=**/*.js,**/*.jsx,**/*.ts,**/*.tsx
sonar.exclusions=node_modules/**,.*/**,**/*.spec.js,**/*.test.js,.git/**,logs/**,dist/**,build/**

# Lenguaje principal
sonar.language=js
sonar.sourceEncoding=UTF-8

# ========================================
# CONFIGURACIÓN DE SEGURIDAD AVANZADA
# ========================================
# Habilitar análisis de Security Hotspots
sonar.security.hotspots.enabled=true

# Máximo nivel de severidad
sonar.issue.severity=blocker,critical,major,minor,info

# Configuración específica para JavaScript
sonar.javascript.file.suffixes=.js,.jsx
sonar.typescript.file.suffixes=.ts,.tsx

# Análisis de vulnerabilidades
sonar.security.sarif.file=security-report.sarif

# Importar reportes de ESLint
sonar.externalIssuesReportPaths=eslint-report.json

# ========================================
# COBERTURA
# ========================================
sonar.coverage.exclusions=node_modules/**,**/*.test.js,**/*.spec.js

# ========================================
# REGLAS Y PERFILES
# ========================================
# Importar todas las reglas disponibles
sonar.inclusions=**/*

# Analizar todo tipo de archivos
sonar.analysis.mode=analysis
