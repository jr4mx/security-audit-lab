name: SonarQube Analysis

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarqube:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Requerido para un mejor análisis de SonarQube

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Check for vulnerable dependencies
        continue-on-error: true
        run: npm audit --production || true

      - name: Run ESLint with JSON report
        continue-on-error: true
        run: npm run lint -- --format json --output-file eslint-report.json || true

      - name: Analyze custom vulnerabilities
        continue-on-error: true
        run: npm run analyze-vuln || true

      - name: Run full security check
        continue-on-error: true
        run: npm run security || true

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v2.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=secure-audit-lab
            -Dsonar.projectName=Secure%20Audit%20Lab
            -Dsonar.sources=.
            -Dsonar.inclusions=**/*.js,**/*.jsx
            -Dsonar.exclusions=node_modules/**,.git/**,logs/**,**/node_modules/**
            -Dsonar.javascript.file.suffixes=.js,.jsx
            -Dsonar.externalIssuesReportPaths=eslint-report.json