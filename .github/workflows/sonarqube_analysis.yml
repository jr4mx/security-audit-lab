name: SonarQube Analysis

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarqube:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run ESLint and convert to SonarQube format
        continue-on-error: true
        run: |
          npx eslint . --format json --output-file eslint-raw.json --ext .js,.jsx,.ts,.tsx 2>/dev/null || true
          
          if [ -f eslint-raw.json ] && [ -s eslint-raw.json ]; then
            node -e '
            const fs = require("fs");
            try {
              const eslintRaw = JSON.parse(fs.readFileSync("eslint-raw.json", "utf8"));
              const sonarIssues = [];
              
              eslintRaw.forEach(file => {
                if (!file.messages || file.messages.length === 0) return;
                
                const filePath = file.filePath;
                
                file.messages.forEach(msg => {
                  if (msg.severity === 1 || msg.severity === 2) {
                    sonarIssues.push({
                      engineId: "eslint",
                      ruleId: msg.ruleId || "eslint-rule",
                      severity: msg.severity === 2 ? "MAJOR" : "MINOR",
                      type: "CODE_SMELL",
                      primaryLocation: {
                        filePath: filePath,
                        textRange: {
                          startLine: msg.line || 1,
                          endLine: msg.endLine || msg.line || 1
                        },
                        message: msg.message
                      }
                    });
                  }
                });
              });
              
              fs.writeFileSync("eslint-report.json", JSON.stringify({ issues: sonarIssues }, null, 2));
              console.log(`✅ Converted ${sonarIssues.length} ESLint issues`);
            } catch (error) {
              console.log("Error:", error.message);
              fs.writeFileSync("eslint-report.json", JSON.stringify({ issues: [] }, null, 2));
            }
            '
          else
            echo '{"issues":[]}' > eslint-report.json
          fi

      - name: Convert custom vulnerabilities to Generic SonarQube format
        run: |
          if [ -f sonarqube-vulnerabilities.json ]; then
            node -e '
            const fs = require("fs");
            
            try {
              const vulnData = JSON.parse(fs.readFileSync("sonarqube-vulnerabilities.json", "utf8"));
              
              if (!vulnData.vulnerabilities || vulnData.vulnerabilities.length === 0) {
                console.log("No vulnerabilities found");
                fs.writeFileSync("vulnerabilities-report.json", JSON.stringify({ issues: [] }, null, 2));
                process.exit(0);
              }
              
              const issues = vulnData.vulnerabilities.map(v => {
                // Mapear severidad
                let severity = "MAJOR";
                if (v.severity === "CRITICAL") severity = "BLOCKER";
                else if (v.severity === "HIGH") severity = "CRITICAL";
                else if (v.severity === "MEDIUM") severity = "MAJOR";
                else severity = "MINOR";
                
                return {
                  engineId: "security-audit",
                  ruleId: v.id,
                  severity: severity,
                  type: "VULNERABILITY",
                  primaryLocation: {
                    filePath: v.file,
                    textRange: {
                      startLine: v.line,
                      endLine: v.line
                    },
                    message: `${v.type}: ${v.description}\nCWE: ${v.cwe}\nRemediation: ${v.remediation}\nCode: ${v.code}`
                  }
                };
              });
              
              const report = { issues: issues };
              fs.writeFileSync("vulnerabilities-report.json", JSON.stringify(report, null, 2));
              console.log(`✅ Converted ${issues.length} vulnerabilities to SonarQube format`);
            } catch (error) {
              console.error("Error:", error.message);
              fs.writeFileSync("vulnerabilities-report.json", JSON.stringify({ issues: [] }, null, 2));
            }
            '
          else
            echo '{"issues":[]}' > vulnerabilities-report.json
            echo "No vulnerabilities file found"
          fi

      - name: Debug - Verify report files
        run: |
          echo "=== eslint-report.json ==="
          head -c 500 eslint-report.json
          echo -e "\n=== vulnerabilities-report.json ==="
          head -c 500 vulnerabilities-report.json
          echo -e "\n=== Validating JSON format ==="
          for file in eslint-report.json vulnerabilities-report.json; do
            if jq empty "$file" 2>/dev/null; then
              echo "✅ $file is valid JSON"
              ISSUES=$(jq '.issues | length' "$file")
              echo "   Contains $ISSUES issues"
            else
              echo "❌ $file has invalid JSON"
              cat "$file"
            fi
          done

      - name: Run security checks
        continue-on-error: true
        run: |
          npm run analyze-vuln || true
          npm run security || true

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v2.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.externalIssuesReportPaths=eslint-report.json,vulnerabilities-report.json